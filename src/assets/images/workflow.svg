<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003b7a;stop-opacity:1" />
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#003b7a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background decorative elements -->
  <circle cx="250" cy="200" r="140" fill="#e8f1ff" opacity="0.4" />

  <!-- Connecting Path Lines -->
  <path d="M110 200 C 180 120, 320 120, 390 200 C 320 280, 180 280, 110 200 Z" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" opacity="0.5" />

  <!-- Workflow Step 1: Input -->
  <g transform="translate(60, 150)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <circle cx="50" cy="35" r="18" fill="url(#gradW)" />
    <!-- SVG Icon inside (Document Input) -->
    <path d="M44 35 L56 35 M50 29 L50 41" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
    <text x="50" y="80" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#0f172a">Captura</text>
  </g>

  <!-- Connection Line Arrow 1 -->
  <path d="M175 200 L210 200" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />
  <polyline points="202,195 210,200 202,205" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Workflow Step 2: Verification/Approval (Middle) -->
  <g transform="translate(200, 110)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <circle cx="50" cy="35" r="18" fill="#e8f1ff" />
    <circle cx="50" cy="35" r="14" fill="#2563eb" />
    <polyline points="46,35 49,38 55,32" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="50" y="80" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#0f172a">Aprovação</text>
  </g>

  <!-- Connection Line Arrow 2 -->
  <path d="M315 200 L350 200" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />
  <polyline points="342,195 350,200 342,205" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Workflow Step 3: Archive (End) -->
  <g transform="translate(340, 150)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <circle cx="50" cy="35" r="18" fill="url(#gradW)" />
    <!-- Archive Box Icon -->
    <rect x="40" y="28" width="20" height="14" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
    <path d="M37 28 L63 28" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
    <text x="50" y="80" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#0f172a">Arquivamento</text>
  </g>
</svg>

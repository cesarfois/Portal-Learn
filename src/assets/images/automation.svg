<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003b7a;stop-opacity:1" />
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#003b7a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background decorative elements -->
  <circle cx="150" cy="180" r="90" fill="#e8f1ff" opacity="0.5" />
  <circle cx="350" cy="220" r="100" fill="#e8f1ff" opacity="0.4" />

  <!-- Centerpiece: Gear and Lightning Bolt -->
  <g transform="translate(250, 200)" filter="url(#drop-shadow)">
    <!-- Gear base -->
    <circle cx="0" cy="0" r="50" fill="url(#gradA)" />
    <!-- Gear teeth -->
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" />
    <path d="M-10,65 L10,65 L15,50 L-15,50 Z" fill="url(#gradA)" transform="rotate(180)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(45)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(90)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(135)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(-45)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(-90)" />
    <path d="M-10,-65 L10,-65 L15,-50 L-15,-50 Z" fill="url(#gradA)" transform="rotate(-135)" />
    
    <!-- Outer Gear Ring -->
    <circle cx="0" cy="0" r="38" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="30" fill="url(#gradA)" />

    <!-- Lightning Bolt Icon inside -->
    <path d="M-6,-18 L10,-4 L2,-2 L8,18 L-8,4 L0,2 Z" fill="#FFFFFF" />
  </g>

  <!-- Smaller secondary gear -->
  <g transform="translate(140, 260)" filter="url(#drop-shadow)">
    <circle cx="0" cy="0" r="30" fill="#64748b" opacity="0.8" />
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="16" fill="#64748b" opacity="0.8" />
  </g>

  <!-- Smart Indexing Floating Card -->
  <g transform="translate(290, 60)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="130" height="90" rx="12" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <rect x="12" y="15" width="40" height="8" rx="3" fill="#2563eb" />
    <rect x="12" y="32" width="106" height="18" rx="4" fill="#e8f1ff" />
    <!-- Indexing OCR text simulator -->
    <text x="18" y="44" font-family="'Outfit', sans-serif" font-weight="600" font-size="9" fill="#003b7a">Process Cloud Ltda</text>
    <rect x="12" y="60" width="80" height="14" rx="4" fill="#f5f7fb" />
    <text x="18" y="70" font-family="'Outfit', sans-serif" font-weight="600" font-size="8" fill="#64748b">CNPJ: 00.000...</text>
  </g>
</svg>

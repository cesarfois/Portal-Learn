<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003b7a;stop-opacity:1" />
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#003b7a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background decorative blobs -->
  <circle cx="400" cy="150" r="100" fill="#e8f1ff" opacity="0.6" />
  <circle cx="120" cy="280" r="80" fill="#e8f1ff" opacity="0.4" />

  <!-- Cloud Cabinet Centerpiece -->
  <rect x="150" y="80" width="200" height="240" rx="16" fill="url(#grad1)" filter="url(#drop-shadow)" />
  
  <!-- Cabinet Drawer 1 -->
  <rect x="170" y="110" width="160" height="50" rx="8" fill="#FFFFFF" opacity="0.95" />
  <rect x="235" y="130" width="30" height="8" rx="4" fill="#64748b" />
  <circle cx="215" cy="134" r="5" fill="#2563eb" />
  
  <!-- Cabinet Drawer 2 -->
  <rect x="170" y="175" width="160" height="50" rx="8" fill="#FFFFFF" opacity="0.95" />
  <rect x="235" y="195" width="30" height="8" rx="4" fill="#64748b" />
  <circle cx="215" cy="199" r="5" fill="#2563eb" />

  <!-- Cabinet Drawer 3 -->
  <rect x="170" y="240" width="160" height="50" rx="8" fill="#FFFFFF" opacity="0.95" />
  <rect x="235" y="260" width="30" height="8" rx="4" fill="#64748b" />
  <circle cx="215" cy="264" r="5" fill="#2563eb" />

  <!-- Flying Documents -->
  <g transform="translate(60, 50)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <line x1="15" y1="20" x2="55" y2="20" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />
    <line x1="15" y1="35" x2="45" y2="35" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    <line x1="15" y1="50" x2="55" y2="50" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    <line x1="15" y1="65" x2="35" y2="65" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
  </g>

  <g transform="translate(370, 180)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#FFFFFF" stroke="#e8f1ff" stroke-width="2" />
    <line x1="15" y1="20" x2="55" y2="20" stroke="#003b7a" stroke-width="3" stroke-linecap="round" />
    <line x1="15" y1="35" x2="55" y2="35" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    <line x1="15" y1="50" x2="35" y2="50" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
    <circle cx="50" cy="65" r="8" fill="#2563eb" />
    <polyline points="47,65 49,67 53,63" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Upload Arrow -->
  <circle cx="340" cy="80" r="28" fill="#2563eb" filter="url(#drop-shadow)" />
  <path d="M340 92 L340 68 M330 78 L340 68 L350 78" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
